<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVCharging — Panel de Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #080c10;
      --panel:     #0d1117;
      --border:    #1a2535;
      --accent:    #00e5ff;
      --green:     #00ff88;
      --red:       #ff3b5c;
      --orange:    #ff9500;
      --gray:      #4a5568;
      --text:      #c9d6e3;
      --muted:     #4a5a6a;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    /* ── Fondo animado ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg,   transparent, transparent 39px, #0a1520 39px, #0a1520 40px),
        repeating-linear-gradient(90deg,  transparent, transparent 39px, #0a1520 39px, #0a1520 40px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }
 
    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,.9);
      backdrop-filter: blur(8px);
    }
 
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      animation: pulse-icon 2s ease-in-out infinite;
    }
 
    @keyframes pulse-icon {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,.4); }
      50%      { box-shadow: 0 0 0 10px rgba(0,229,255,0); }
    }
 
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: #fff;
    }
 
    .logo-text span { color: var(--accent); }
 
    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
      font-family: var(--mono);
      font-size: .78rem;
    }
 
    #clock { color: var(--accent); }
 
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }
 
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: .2; }
    }
 
    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 1;
      padding: 28px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
 
    /* ── Sección título ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }
 
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
    }
 
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
 
    .badge {
      font-family: var(--mono);
      font-size: .7rem;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
    }
 
    /* ── Grid de CPs ── */
    #cp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
 
    .cp-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gray);
      padding: 18px 20px;
      position: relative;
      transition: transform .2s, border-color .3s;
      
    }
 
    .cp-card:hover { transform: translateY(-2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* Colores por estado */
    .cp-card.AVAILABLE  { border-top-color: var(--green); }
    .cp-card.CHARGING   { border-top-color: var(--accent); }
    .cp-card.STOPPED    { border-top-color: var(--orange); }
    .cp-card.ERROR      { border-top-color: var(--red); }
    .cp-card.OFFLINE    { border-top-color: var(--gray); }
 
    .cp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
 
    .cp-id {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
 
    .cp-id span {
      font-size: .65rem;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      letter-spacing: .08em;
    }
 
    .cp-status-badge {
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      letter-spacing: .1em;
    }
 
    .badge-AVAILABLE { background: rgba(0,255,136,.12); color: var(--green);  border: 1px solid rgba(0,255,136,.3); }
    .badge-CHARGING  { background: rgba(0,229,255,.12); color: var(--accent); border: 1px solid rgba(0,229,255,.3); animation: pulse-badge 1s ease-in-out infinite; }
    .badge-STOPPED   { background: rgba(255,149,0,.12);  color: var(--orange); border: 1px solid rgba(255,149,0,.3); }
    .badge-ERROR     { background: rgba(255,59,92,.12);  color: var(--red);    border: 1px solid rgba(255,59,92,.3); }
    .badge-OFFLINE   { background: rgba(74,86,104,.12);  color: var(--gray);   border: 1px solid rgba(74,86,104,.3); }
 
    @keyframes pulse-badge {
      0%,100% { opacity: 1; }
      50%      { opacity: .55; }
    }
 
    .cp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(26,37,53,.8);
      font-size: .85rem;
    }
 
    .cp-row:last-child { border-bottom: none; }
 
    .cp-label {
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
 
    .cp-value {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--text);
    }
 
    .temp-ok  { color: var(--green); }
    .temp-ko  { color: var(--red); }
    .temp-na  { color: var(--muted); }
 
    .reg-yes { color: var(--green); }
    .reg-no  { color: var(--orange); }
 
    /* ── Clientes ── */
    #clientes-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 40px;
    }
 
    .cliente-chip {
      font-family: var(--mono);
      font-size: .8rem;
      padding: 6px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      
    }
 
    /* ── Climas ── */
    #climas-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 40px;
    }
 
    .clima-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px 18px;
      min-width: 160px;
      
    }
 
    .clima-city {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
 
    .clima-temp {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
    }
 
    .clima-temp.ok { color: var(--green); }
    .clima-temp.ko { color: var(--red); }
 
    .clima-estado {
      font-family: var(--mono);
      font-size: .65rem;
      margin-top: 4px;
      letter-spacing: .1em;
    }
 
    .clima-estado.ok { color: var(--green); }
    .clima-estado.ko { color: var(--red); }
 
    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 20px;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
 
    /* ── Loading ── */
    .loader {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--muted);
    }
 
    .loader-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: loader 1.2s ease-in-out infinite;
    }
 
    .loader-dot:nth-child(2) { animation-delay: .2s; }
    .loader-dot:nth-child(3) { animation-delay: .4s; }
 
    @keyframes loader {
      0%,100% { opacity: .2; transform: scale(.8); }
      50%      { opacity: 1;  transform: scale(1.2); }
    }
 
    #last-update {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
 
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">EV<span>Charging</span> &mdash; CENTRAL</div>
  </div>
  <div class="header-right">
    <span id="last-update">Conectando...</span>
    <div class="status-dot" id="status-dot"></div>
    <span id="clock">--:--:--</span>
  </div>
</header>
 
<main>
 
  <!-- CPs -->
  <div class="section-header">
    <div class="section-title">Puntos de Recarga</div>
    <div class="section-line"></div>
    <div class="badge" id="cp-count">— CPs</div>
  </div>
  <div id="cp-grid">
    <div class="loader">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
      <span>Cargando CPs...</span>
    </div>
  </div>
 
  <!-- Climas -->
  <div class="section-header">
    <div class="section-title">Estado del Clima</div>
    <div class="section-line"></div>
  </div>
  <div id="climas-grid">
    <div class="loader">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
      <span>Cargando climas...</span>
    </div>
  </div>
 
  <!-- Clientes -->
  <div class="section-header">
    <div class="section-title">Clientes Registrados</div>
    <div class="section-line"></div>
    <div class="badge" id="cliente-count">— clientes</div>
  </div>
  <div id="clientes-list">
    <div class="loader">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
      <span>Cargando clientes...</span>
    </div>
  </div>
 
</main>
 
<footer>
  EVCharging Network &mdash; Sistemas Distribuidos 25/26 &mdash; Panel de Monitorización
</footer>
 
<script>
  // ── Reloj ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('es-ES', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();
 
  // ── Helpers ──
  function estadoLabel(estado) {
    const map = {
      AVAILABLE: 'DISPONIBLE',
      CHARGING:  'CARGANDO',
      STOPPED:   'PARADO',
      ERROR:     'ERROR',
      OFFLINE:   'DESCONECTADO',
    };
    return map[estado] || estado;
  }
 
  function tempClass(temp) {
    if (temp === '-' || temp === null) return 'temp-na';
    return temp <= 0 ? 'temp-ko' : 'temp-ok';
  }
 
  function tempDisplay(temp) {
    if (temp === '-' || temp === null || temp === undefined) return '—';
    return parseFloat(temp).toFixed(1) + ' °C';
  }
 
  // ── Render CPs ──
  function renderCPs(cps) {
    const grid = document.getElementById('cp-grid');
    document.getElementById('cp-count').textContent = cps.length + ' CPs';
 
    if (!cps.length) {
      grid.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:.8rem">Sin CPs registrados</span>';
      return;
    }
 
    grid.innerHTML = cps.map((cp, i) => `
      <div class="cp-card ${cp.estado}" style="animation-delay:${i * 0.05}s">
        <div class="cp-header">
          <div class="cp-id">
            CP-${cp.id}
            <span>${cp.location.toUpperCase()}</span>
          </div>
          <div class="cp-status-badge badge-${cp.estado}">${estadoLabel(cp.estado)}</div>
        </div>
        <div class="cp-row">
          <span class="cp-label">Temperatura</span>
          <span class="cp-value ${tempClass(cp.temperatura)}">${tempDisplay(cp.temperatura)}</span>
        </div>
        <div class="cp-row">
          <span class="cp-label">Registrado</span>
          <span class="cp-value ${cp.registrado ? 'reg-yes' : 'reg-no'}">${cp.registrado ? 'SÍ' : 'NO'}</span>
        </div>
        <div class="cp-row">
          <span class="cp-label">Token</span>
          <span class="cp-value" style="font-size:.65rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${cp.token ? cp.token.substring(0, 20) + '…' : '—'}
          </span>
        </div>
      </div>
    `).join('');
  }
 
  // ── Render Climas ──
  function renderClimas(climas) {
    const grid = document.getElementById('climas-grid');
    if (!climas || !climas.length) {
      grid.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:.8rem">Sin datos de clima</span>';
      return;
    }
    grid.innerHTML = climas.map((c, i) => {
      const ko = c.temperatura <= 0 || c.estado === 'KO';
      return `
        <div class="clima-card" style="animation-delay:${i * 0.05}s">
          <div class="clima-city">${c.ciudad}</div>
          <div class="clima-temp ${ko ? 'ko' : 'ok'}">${parseFloat(c.temperatura).toFixed(1)}°</div>
          <div class="clima-estado ${ko ? 'ko' : 'ok'}">${ko ? '⚠ ALERTA' : '✓ OPERATIVO'}</div>
        </div>
      `;
    }).join('');
  }
 
  // ── Render Clientes ──
  function renderClientes(clientes) {
    const list = document.getElementById('clientes-list');
    document.getElementById('cliente-count').textContent = clientes.length + ' clientes';
    if (!clientes.length) {
      list.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:.8rem">Sin clientes</span>';
      return;
    }
    list.innerHTML = clientes.map(id => `
      <div class="cliente-chip">DRIVER #${id}</div>
    `).join('');
  }
 
  // ── Cache para detectar cambios ──
  let _cacheEstado = null;
  let _cacheClimas = null;
  let _cacheClientes = null;
 
  function changed(a, b) {
    return JSON.stringify(a) !== JSON.stringify(b);
  }
 
  // ── Fetch y actualización ──
  async function refresh() {
    const dot = document.getElementById('status-dot');
    try {
      const [resEstado, resClimas, resClientes] = await Promise.all([
        fetch('/estado'),
        fetch('/climas'),
        fetch('/api/clientes')
      ]);
 
      if (!resEstado.ok)   throw new Error('Error /estado');
      if (!resClientes.ok) throw new Error('Error /api/clientes');
 
      const dataEstado  = await resEstado.json();
      const dataClimas  = resClimas.ok ? await resClimas.json() : null;
      const clientes    = await resClientes.json();
 
      const cps    = dataEstado.cps || [];
      const climas = dataClimas ? (dataClimas.climas || []) : [];
 
      if (changed(cps, _cacheEstado)) {
        renderCPs(cps);
        _cacheEstado = cps;
      }
 
      if (changed(climas, _cacheClimas)) {
        renderClimas(climas);
        _cacheClimas = climas;
      }
 
      if (changed(clientes, _cacheClientes)) {
        renderClientes(clientes);
        _cacheClientes = clientes;
      }
 
      dot.style.background = 'var(--green)';
      dot.style.boxShadow  = '0 0 8px var(--green)';
      document.getElementById('last-update').textContent =
        'Actualizado ' + new Date().toLocaleTimeString('es-ES', { hour12: false });
 
    } catch (err) {
      dot.style.background = 'var(--red)';
      dot.style.boxShadow  = '0 0 8px var(--red)';
      document.getElementById('last-update').textContent = 'Sin conexión con API';
      console.error(err);
    }
  }
 
  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
